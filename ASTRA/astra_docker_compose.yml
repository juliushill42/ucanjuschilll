version: '3.9'

# ============================================================
# ASTRA PLATFORM — Production Docker Compose
# Julius Cameron Hill IP
# Zero hardcoded secrets — all from .env
# ============================================================

services:

  postgres:
    image: postgres:15-alpine
    container_name: astra-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: astra-cache
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  go-api:
    build:
      context: ./go-api
      dockerfile: Dockerfile
    image: astra/go-api:latest
    container_name: astra-go-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@astra-db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD}@astra-cache:6379
      GIN_MODE: release
    ports: ["8080:8080"]
    mem_limit: 512m
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/streams/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-worker:
    build:
      context: ./ai-worker
      dockerfile: Dockerfile
    image: astra/ai-worker:latest
    container_name: astra-ai-worker
    restart: unless-stopped
    env_file: .env
    environment:
      GO_API_URL: http://astra-go-api:8080
    volumes:
      - astra_tmp:/tmp/astra
    mem_limit: 2g
    cpus: "2.0"
    depends_on:
      go-api: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "test -S /tmp/astra/ai.sock || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  ingest:
    build:
      context: ./rust-ingest
      dockerfile: Dockerfile
    image: astra/ingest:latest
    container_name: astra-ingest
    restart: unless-stopped
    env_file: .env
    environment:
      RTMP_BIND: 0.0.0.0:1935
      GO_API_URL: http://astra-go-api:8080
      AI_SOCKET_PATH: /tmp/astra/ai.sock
      HLS_OUTPUT_DIR: /tmp/astra/hls
    ports: ["1935:1935"]
    volumes:
      - astra_tmp:/tmp/astra
      - hls_data:/tmp/astra/hls
    mem_limit: 1g
    depends_on:
      go-api: {condition: service_healthy}
      ai-worker: {condition: service_healthy}

  nginx:
    image: nginx:alpine
    container_name: astra-cdn
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - hls_data:/usr/share/nginx/html/hls:ro
      - ./ssl:/etc/nginx/ssl:ro
    mem_limit: 256m
    depends_on:
      - ingest
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  hls_data:
  astra_tmp:
