version: '3.9'

# =============================================================================
# JUSCHILL PLATFORM — Production Docker Compose  (JCH-2026 IP)
# Voice & Vision + Artist Social Network
# Built on ASTRA streaming infrastructure
# Zero hardcoded secrets — all from .env
# =============================================================================

services:

  postgres:
    image: postgres:15-alpine
    container_name: juschill-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: juschill-cache
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  go-api:
    build:
      context: ./go-api
      dockerfile: Dockerfile
    image: juschill/go-api:latest
    container_name: juschill-go-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL:   postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@juschill-db:5432/${POSTGRES_DB}
      JWT_SECRET:     ${JWT_SECRET}
      REDIS_URL:      redis://:${REDIS_PASSWORD}@juschill-cache:6379
      GIN_MODE:       release
      STORAGE_PATH:   /data/uploads
      HLS_BASE_URL:   ${HLS_BASE_URL}
      AI_WORKER_URL:  http://juschill-ai-worker:8001
      PORT:           "8000"
    ports: ["8000:8000"]
    volumes:
      - uploads_data:/data/uploads
    mem_limit: 512m
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-worker:
    build:
      context: ./ai-worker
      dockerfile: Dockerfile
    image: juschill/ai-worker:latest
    container_name: juschill-ai-worker
    restart: unless-stopped
    env_file: .env
    environment:
      GO_API_URL:                    http://juschill-go-api:8000
      STORAGE_PATH:                  /data/uploads
      GCP_PROJECT_ID:                ${GCP_PROJECT_ID}
      GCP_REGION:                    ${GCP_REGION}
      GOOGLE_APPLICATION_CREDENTIALS: /var/secrets/google/key.json
    volumes:
      - uploads_data:/data/uploads
      - ai_tmp:/tmp/juschill
      - ${GCP_KEY_PATH:-./gcp-key.json}:/var/secrets/google/key.json:ro
    mem_limit: 4g
    cpus: "4.0"
    depends_on:
      go-api: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rust-ingest:
    build:
      context: ./rust-ingest
      dockerfile: Dockerfile
    image: juschill/ingest:latest
    container_name: juschill-ingest
    restart: unless-stopped
    env_file: .env
    environment:
      RTMP_BIND:      0.0.0.0:1935
      GO_API_URL:     http://juschill-go-api:8000
      HLS_OUTPUT_DIR: /tmp/juschill/hls
    ports: ["1935:1935"]
    volumes:
      - ai_tmp:/tmp/juschill
      - hls_data:/tmp/juschill/hls
    mem_limit: 1g
    depends_on:
      go-api:     {condition: service_healthy}
      ai-worker:  {condition: service_healthy}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL:      ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_HLS_BASE_URL: ${HLS_BASE_URL}
        NEXT_PUBLIC_RTMP_URL:     ${RTMP_URL}
    image: juschill/frontend:latest
    container_name: juschill-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL:      ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_HLS_BASE_URL: ${HLS_BASE_URL}
    ports: ["3000:3000"]
    mem_limit: 512m
    depends_on:
      go-api: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: juschill-cdn
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - hls_data:/usr/share/nginx/html/hls:ro
      - uploads_data:/usr/share/nginx/html/uploads:ro
    mem_limit: 256m
    depends_on:
      - frontend
      - go-api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  hls_data:
  uploads_data:
  ai_tmp:
