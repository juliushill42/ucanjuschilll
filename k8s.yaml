# ============================================================
# UCANJUSCHILL — Kubernetes Manifests (Vertex AI Edition)
# Julius Cameron Hill IP — Sovereign Moat Protection
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: ucanjuschill

---
# ── AI Worker Service Account (Workload Identity) ──
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-worker
  namespace: ucanjuschill
  annotations:
    iam.gke.io/gcp-service-account: ai-worker@gen-lang-client-0695165560.iam.gserviceaccount.com

---
# ── Go API Deployment (Standardized Port 8080) ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-api
  namespace: ucanjuschill
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-api
  template:
    metadata:
      labels:
        app: go-api
    spec:
      containers:
        - name: go-api
          image: us-east1-docker.pkg.dev/gen-lang-client-0695165560/juschill-repo/go-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: GIN_MODE
              value: release
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: redis-url
            - name: AI_WORKER_URL
              value: "http://ai-worker:8001"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: go-api
  namespace: ucanjuschill
spec:
  selector:
    app: go-api
  ports:
    - port: 8080
      targetPort: 8080

---
# ── AI Worker Deployment (Vertex AI & Speech Logic) ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-worker
  namespace: ucanjuschill
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-worker
  template:
    metadata:
      labels:
        app: ai-worker
    spec:
      serviceAccountName: ai-worker
      containers:
        - name: ai-worker
          image: us-east1-docker.pkg.dev/gen-lang-client-0695165560/juschill-repo/ai-worker:latest
          ports:
            - containerPort: 8001
          env:
            - name: GO_API_URL
              value: "http://go-api:8080"
            - name: GCP_PROJECT_ID
              value: "gen-lang-client-0695165560"
            - name: GCP_REGION
              value: "us-central1"
            - name: STORAGE_PATH
              value: "/data/uploads"
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 4Gi

---
apiVersion: v1
kind: Service
metadata:
  name: ai-worker
  namespace: ucanjuschill
spec:
  selector:
    app: ai-worker
  ports:
    - port: 8001
      targetPort: 8001

---
# ── Rust Ingest (RTMP Ingest) ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest
  namespace: ucanjuschill
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingest
  template:
    metadata:
      labels:
        app: ingest
    spec:
      containers:
        - name: ingest
          image: us-east1-docker.pkg.dev/gen-lang-client-0695165560/juschill-repo/ingest:latest
          ports:
            - containerPort: 1935
          env:
            - name: RTMP_BIND
              value: "0.0.0.0:1935"
            - name: GO_API_URL
              value: "http://go-api:8080"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: ingest
  namespace: ucanjuschill
spec:
  type: LoadBalancer
  selector:
    app: ingest
  ports:
    - port: 1935
      targetPort: 1935
      name: rtmp

---
# ── Redis (Internal Cache) ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ucanjuschill
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ucanjuschill
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
# ── Nginx Reverse Proxy (Frontend + API Gateway) ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: ucanjuschill
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: ucanjuschill
  annotations:
    cloud.google.com/load-balancer-type: External
spec:
  type: LoadBalancer
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
      name: http
